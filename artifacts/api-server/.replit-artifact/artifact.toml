kind = "api"
previewPath = "/api"
title = "API Server"
version = "1.0.0"
id = "3B4_FFSkEVBkAeYMFRJ2e"

[[services]]
localPort = 8080
name = "API Server"
paths = ["/api"]

[services.development]
run = "pnpm --filter @workspace/api-server run dev"

[services.production]
build = ["sh", "-c", "npm install -g pnpm@9.15.9 && pnpm install && pnpm --filter @workspace/nafsam run build && pnpm --filter @workspace/api-server run build"]
run = ["pnpm", "--filter", "@workspace/api-server", "run", "start"]

[services.env]
PORT = "8080"
NODE_ENV = "production"

[services.production.health.startup]
path = "/api/healthz"
