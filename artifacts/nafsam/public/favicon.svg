<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="180" y2="180" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0b1020"/>
      <stop offset="1" stop-color="#050814"/>
    </linearGradient>
    <linearGradient id="rose" x1="30" y1="30" x2="150" y2="150" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#f3c89e"/>
      <stop offset="1" stop-color="#b88656"/>
    </linearGradient>
  </defs>
  <rect width="180" height="180" rx="36" fill="url(#bg)"/>
  <rect x="3" y="3" width="174" height="174" rx="33" fill="none" stroke="url(#rose)" stroke-width="1.5" opacity="0.55"/>
  <g transform="translate(90 90)">
    <circle r="48" fill="none" stroke="url(#rose)" stroke-width="2" opacity="0.4"/>
    <text x="0" y="22" text-anchor="middle" font-family="'Tajawal','Amiri','Noto Naskh Arabic',serif" font-size="78" font-weight="700" fill="url(#rose)">ن</text>
  </g>
